<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DGIME · Dashboard Ejecutivo Consolidado</title>

<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
<style>
:root{
  --navy:#0D1B2A;--navy2:#162232;--blue:#1A56DB;--blue2:#2563EB;--teal:#0694A2;--teal2:#06B6D4;
  --green:#057A55;--green2:#10B981;--amber:#B45309;--amber2:#F59E0B;--red:#C81E1E;--red2:#F05252;
  --purple:#6C2BD9;--purple2:#8B5CF6;--bg:#F0F4F8;--card:#FFFFFF;--border:#E2E8F0;
  --text:#1E293B;--muted:#64748B;--sidebar-w:220px;--radius:14px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.07);--shadow-lg:0 4px 24px rgba(0,0,0,.10)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;min-height:100vh;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-brand{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.brand-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.brand-text{font-size:13px;font-weight:800;color:white;letter-spacing:.3px;line-height:1.3}.brand-sub{font-size:10px;color:rgba(255,255,255,.4);font-weight:400}
.nav{flex:1;padding:12px 10px;overflow-y:auto}.nav-label{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}.nav-item.active{background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;font-weight:700;box-shadow:0 4px 12px rgba(26,86,219,.3)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.7}.nav-item.active svg{opacity:1}.nav-badge{margin-left:auto;font-size:10px;font-weight:800;background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);padding:1px 7px;border-radius:6px}.nav-item.active .nav-badge{background:rgba(255,255,255,.2);color:white}
.sidebar-bottom{padding:12px 10px;border-top:1px solid rgba(255,255,255,.07)}.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px}.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--blue));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white}.user-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.8)}.user-role{font-size:10px;color:rgba(255,255,255,.35)}
.topbar{position:fixed;top:0;left:var(--sidebar-w);right:0;height:60px;z-index:90;background:rgba(240,244,248,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px}.topbar-title{font-size:15px;font-weight:700;color:var(--text)}.topbar-sub{font-size:11px;color:var(--muted);margin-top:1px}.topbar-spacer{flex:1}.topbar-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;background:linear-gradient(135deg,#EFF6FF,#DBEAFE);color:var(--blue);border:1px solid #BFDBFE}.topbar-time{font-size:11px;color:var(--muted);padding:5px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.main{margin-left:var(--sidebar-w);margin-top:60px;flex:1;padding:20px 24px 32px;min-height:calc(100vh - 60px)}
.toolbar-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;box-shadow:var(--shadow);display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}.field{display:flex;flex-direction:column;gap:4px;min-width:150px;flex:1;max-width:220px}.field label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}.field input,.field select{border:1px solid var(--border);border-radius:9px;padding:8px 11px;font-size:13px;color:var(--text);background:var(--bg);outline:none}.field input:focus,.field select:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:white}.toolbar-sep{width:1px;height:36px;background:var(--border);flex-shrink:0;align-self:center}.status-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;flex-shrink:0;white-space:nowrap}.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green2);flex-shrink:0;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;border:none;font-size:12.5px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}.btn-primary{background:var(--blue2);color:white;box-shadow:0 2px 8px rgba(37,99,235,.25)}.btn-primary:hover{background:var(--blue);transform:translateY(-1px)}.btn-teal{background:var(--teal);color:white;box-shadow:0 2px 8px rgba(6,148,162,.25)}.btn-teal:hover{background:#057080;transform:translateY(-1px)}.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg);border-color:#CBD5E1}.btn svg{width:14px;height:14px;flex-shrink:0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}.kpi-accent{position:absolute;top:0;left:0;right:0;height:3px}.kpi-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:17px}.kpi-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}.kpi-value{font-size:24px;font-weight:900;color:var(--text);line-height:1;letter-spacing:-.5px}.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4}.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;margin-top:4px}.delta-up{background:#D1FAE5;color:#065F46}.delta-dn{background:#FEE2E2;color:#991B1B}.delta-neu{background:#EFF6FF;color:#1D4ED8}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin:20px 0 12px}.section-hdr h2{font-size:15px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}.section-hdr h2 span{font-size:20px}.section-hdr-right{display:flex;gap:8px;align-items:center}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:18px}.summary-card h3{font-size:14px;font-weight:800;margin-bottom:8px}.summary-card p,.summary-card li{font-size:12.8px;line-height:1.55;color:#374151}.summary-card ul{padding-left:18px;margin-top:8px}.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}.mini-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}.mini-card h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}.mini-card p{font-size:13px;line-height:1.5;color:#374151}.mini-card strong{color:var(--text)}
.charts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:18px}.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}.chart-card.wide{grid-column:1/-1}.chart-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}.chart-subtitle{font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.4}.chart-box{position:relative;height:245px}.chart-box-lg{height:300px}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}.table-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.table-header h3{font-size:13px;font-weight:700;color:var(--text)}.table-wrap{overflow-x:auto}table.dt{width:100%;min-width:980px;border-collapse:collapse}table.dt th{background:#F8FAFC;color:var(--muted);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}table.dt td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--text);vertical-align:middle}table.dt tr:last-child td{border-bottom:none}table.dt tr:hover td{background:#F8FAFC}.badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:3px 9px;font-size:10.5px;font-weight:700;white-space:nowrap}.badge-blue{background:#DBEAFE;color:#1D4ED8}.badge-green{background:#D1FAE5;color:#065F46}.badge-amber{background:#FEF3C7;color:#92400E}.badge-red{background:#FEE2E2;color:#991B1B}.badge-gray{background:#F1F5F9;color:var(--muted)}.badge-purple{background:#EDE9FE;color:#6D28D9}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--muted)}.empty-state .es-icon{font-size:40px;opacity:.4}.empty-state h3{font-size:15px;font-weight:700;color:var(--text);opacity:.5}.empty-state p{font-size:13px;text-align:center;max-width:320px;line-height:1.5;opacity:.6}.loading-bar{height:3px;background:linear-gradient(90deg,var(--blue),var(--teal),var(--blue));background-size:200% 100%;animation:loading 1.5s infinite;border-radius:2px;margin-bottom:16px}@keyframes loading{0%{background-position:0% 0}100%{background-position:200% 0}}.toast{position:fixed;bottom:20px;right:20px;z-index:200;background:var(--navy);color:white;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg);transform:translateY(80px);transition:transform .3s}.toast.show{transform:translateY(0)}
@media(max-width:1280px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}@media(max-width:1024px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.summary-grid{grid-template-columns:1fr}.charts-grid{grid-template-columns:1fr}}@media(max-width:768px){.sidebar{transform:translateX(-100%)}.main,.topbar{margin-left:0;left:0}.kpi-grid{grid-template-columns:1fr}}@media print{.sidebar,.topbar,.toolbar-card,.btn{display:none!important}.main{margin:0;padding:16px}.kpi-grid{grid-template-columns:repeat(4,1fr)}.charts-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><div class="brand-icon">⚙</div><div><div class="brand-text">DGIME</div><div class="brand-sub">SIPROSA · Tucumán</div></div></div>
  <nav class="nav">
    <div class="nav-label">Módulos</div>
    <button class="nav-item active" data-tab="general" onclick="switchTab('general',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      General <span class="nav-badge" id="badge-general">—</span>
    </button>
    <button class="nav-item" data-tab="obras" onclick="switchTab('obras',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21V5a2 2 0 012-2h9a2 2 0 012 2v16"/><path d="M9 21v-5h3v5"/><path d="M8 7h1M12 7h1M8 11h1M12 11h1"/><path d="M17 9h1a2 2 0 012 2v10"/></svg>
      Dpto. Obras <span class="nav-badge" id="badge-obras">—</span>
    </button>
    <button class="nav-item" data-tab="produccion" onclick="switchTab('produccion',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21V9l6 4V9l6 4V7l6 4v10H3z"/><path d="M7 17h2M12 17h2M17 17h2"/></svg>
      Dpto. Producción <span class="nav-badge" id="badge-produccion">—</span>
    </button>
    <button class="nav-item" data-tab="rf" onclick="switchTab('rf',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 6V5a2 2 0 012-2h0a2 2 0 012 2v1"/><path d="M3 7h18v12a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/><path d="M3 12h18M10 12v2h4v-2"/></svg>
      Recursos Físicos <span class="nav-badge" id="badge-rf">—</span>
    </button>
    <div class="nav-label" style="margin-top:14px">Datos</div>
    <button class="nav-item" onclick="showSourceStatus()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h10M4 18h6"/></svg>
      Estado de datos
    </button>
    <button class="nav-item" onclick="refreshAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 01-15.5 6.2"/><path d="M3 12A9 9 0 0118.5 5.8"/><path d="M18 3v4h4M6 21v-4H2"/></svg>
      Refrescar consolidado
    </button>
  </nav>
  <div class="sidebar-bottom"><div class="sidebar-user"><div class="user-avatar">DG</div><div><div class="user-name">Dirección</div><div class="user-role">Tablero consolidado</div></div></div></div>
</aside>
<header class="topbar">
  <div><div class="topbar-title" id="topbar-title">Dashboard General Consolidado</div><div class="topbar-sub" id="topbar-sub">Análisis de la pestaña CONSOLIDADO completa</div></div>
  <div class="topbar-spacer"></div><div class="topbar-badge" id="topbar-refresh-status">Cargando...</div><div class="topbar-time" id="topbar-time">—</div>
</header>
<main class="main" id="main-content">
  <div class="toolbar-card" id="toolbar-area">
    <div class="field"><label>Fecha desde</label><input type="date" id="g-from" value="2026-01-01"></div>
    <div class="field"><label>Fecha hasta</label><input type="date" id="g-to" value="2026-04-30"></div>
    <div class="field"><label>Estado</label><select id="g-estado"><option value="">Todos</option></select></div>
    <div class="field"><label>Rubro / Tipo</label><select id="g-rubro"><option value="">Todos</option></select></div>
    <div class="field"><label>Búsqueda libre</label><input type="text" id="g-search" placeholder="Efector, sector, ID..."></div>
    <div class="toolbar-sep"></div>
    <button class="btn btn-primary" onclick="applyFilters()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4h18l-7 8v6l-4 2v-8L3 4z"/></svg>Aplicar</button>
    <button class="btn btn-ghost" onclick="clearFilters()">Limpiar</button>
    <button class="btn btn-teal" onclick="exportPDF()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h5"/></svg>Exportar PDF</button>
    <div class="status-pill" id="status-pill"><div class="status-dot" style="background:var(--amber2)"></div><span id="status-text">Cargando CONSOLIDADO...</span></div>
  </div>
  <div class="loading-bar" id="loading-bar" style="display:none"></div>
  <div id="export-area">
    <div class="section-hdr"><h2><span>📌</span> Resumen ejecutivo</h2></div>
    <div class="summary-card" id="summary-container"></div>
    <div class="section-hdr"><h2><span>📊</span> Indicadores principales</h2></div>
    <div class="kpi-grid" id="kpi-container"></div>
    <div class="section-hdr"><h2><span>📈</span> Visualizaciones del consolidado</h2><div class="section-hdr-right"><span id="chart-count" style="font-size:11px;color:var(--muted)"></span></div></div>
    <div class="charts-grid" id="charts-container"></div>
    <div class="section-hdr"><h2><span>📋</span> Muestra de registros</h2></div>
    <div class="table-card" id="table-container"></div>

<div class="toast" id="toast"></div>
<script>
'use strict';

const CONFIG = {
  consolidado: {
    label: 'CONSOLIDADO',
    CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTjKIJnzV8oxK7uDAxU9Jx4WJj8V6yLZhhJd6hiu7XHzhZoHInkgpJKpwknj5IXxNXH17is_mt0hpHj/pub?gid=2122917362&single=true&output=csv'
  }
};

const DERIVAR_MAP = {
  'DO':'Dpto. Obras','D.O.':'Dpto. Obras','OBRAS':'Dpto. Obras',
  'DP':'Dpto. Producción','D.P.':'Dpto. Producción','PRODUCCION':'Dpto. Producción','PRODUCCIÓN':'Dpto. Producción',
  'RF':'Recursos Físicos','R.F.':'Recursos Físicos','RECURSOS FISICOS':'Recursos Físicos','RECURSOS FÍSICOS':'Recursos Físicos'
};

const TAB_META = {
  general:{title:'Dashboard General Consolidado',sub:'Pestaña CONSOLIDADO analizada como conjunto',filter:null},
  obras:{title:'Módulo Dpto. Obras',sub:'CONSOLIDADO filtrado por columna DERIVAR = DO',filter:['DO','D.O.','OBRAS']},
  produccion:{title:'Módulo Dpto. Producción',sub:'CONSOLIDADO filtrado por columna DERIVAR = DP',filter:['DP','D.P.','PRODUCCION','PRODUCCIÓN']},
  rf:{title:'Módulo Recursos Físicos',sub:'CONSOLIDADO filtrado por columna DERIVAR = RF',filter:['RF','R.F.','RECURSOS FISICOS','RECURSOS FÍSICOS']}
};

const PALETTE = ['#1A56DB','#0694A2','#10B981','#F59E0B','#8B5CF6','#F05252','#0EA5E9','#84CC16','#EC4899','#F97316','#14B8A6','#6366F1'];

const S = { raw:{consolidado:[]}, charts:{}, activeTab:'general', lastRefresh:null };

document.addEventListener('DOMContentLoaded', async()=>{
  updateClock(); setInterval(updateClock,30000);
  await refreshAll();
});

function updateClock(){
  const now=new Date();
  document.getElementById('topbar-time').textContent=now.toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

function switchTab(tab,btnEl){
  S.activeTab=tab;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(btnEl) btnEl.classList.add('active');
  const meta=TAB_META[tab]||TAB_META.general;
  document.getElementById('topbar-title').textContent=meta.title;
  document.getElementById('topbar-sub').textContent=meta.sub;
  populateFilters();
  renderModule();
}

async function refreshAll(){
  showLoading(true);
  setStatus('⏳ Conectando con la pestaña CONSOLIDADO...','amber');
  await loadConsolidado();
  populateFilters();
  renderModule();
  updateBadges();
  showLoading(false);
  setStatus(`Datos actualizados · ${new Date().toLocaleString('es-AR')}`,'green');
  document.getElementById('topbar-refresh-status').textContent='✓ Consolidado listo';
}

async function loadConsolidado(){
  const url=CONFIG.consolidado.CSV_URL+'&t='+Date.now();
  try{
    const res=await fetch(url,{cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    if(text.trim().startsWith('<!')) throw new Error('El Sheet no está publicado correctamente como CSV público');
    const rows=csvToObjects(text);
    S.raw.consolidado=rows.map(r=>normalizeRow(r));
    S.lastRefresh=new Date();
    console.log(`[DGIME] CONSOLIDADO: ${rows.length} filas cargadas`);
  }catch(e){
    console.warn('[DGIME] No se pudo leer CONSOLIDADO:',e.message);
    S.raw.consolidado=[];
    setStatus(`⚠ CONSOLIDADO: ${e.message}`,'amber');
  }
}

function csvToObjects(csvText){
  const rows=parseCSV(csvText);
  if(rows.length<2) return [];
  const headers=rows[0].map(h=>String(h||'').trim().replace(/^\uFEFF/,'').replace(/\s+/g,' '));
  return rows.slice(1).filter(r=>r.some(c=>String(c||'').trim())).map(row=>{
    const obj={__cells:row};
    headers.forEach((h,i)=>{ obj[h || `COL_${i+1}`]=row[i]??''; });
    return obj;
  });
}

function parseCSV(text){
  const rows=[]; let row=[]; let cell=''; let inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"' && inQ && n==='"'){ cell+='"'; i++; }
    else if(c==='"'){ inQ=!inQ; }
    else if(c===',' && !inQ){ row.push(cell); cell=''; }
    else if((c==='\n'||c==='\r') && !inQ){ if(c==='\r'&&n==='\n') i++; row.push(cell); rows.push(row); row=[]; cell=''; }
    else{ cell+=c; }
  }
  if(cell || row.length){ row.push(cell); rows.push(row); }
  return rows;
}

function normalizeRow(row){
  const out={...row,__source:'consolidado',__sourceLabel:'CONSOLIDADO'};
  const derivarRaw=getField(row,['DERIVAR','Derivar','derivar','Área derivada','Area derivada']) || getCell(row,30); // AE = índice 30
  out.__derivarRaw=String(derivarRaw||'').trim();
  out.__derivar=DERIVAR_MAP[normText(out.__derivarRaw)] || out.__derivarRaw || 'Sin derivación';
  out.__estado=getField(row,['ESTADO','Estado','estado','Situación','SITUACION']) || 'Sin estado';
  out.__rubro=getField(row,['RUBRO','Rubro','rubro','TIPO','Tipo','tipo','Categoría','Categoria','SECCION','Seccion']) || 'Sin rubro';
  out.__fecha=parseDateFlex(getField(row,['Timestamp','Marca temporal','FECHA','Fecha','fecha','FECHA DE PROGRAMACIÓN','FECHA INICIO TAREAS','FECHA FINALIZACIÓN','FECHA FINALIZACION','Fecha de salida','Fecha OC','FECHA DE ORDEN DE TRABAJO']));
  out.__efector=getField(row,['Efector','EFECTOR','Establecimiento','ESTABLECIMIENTO','DESTINO','ORIGEN']) || 'Sin identificar';
  out.__sector=getField(row,['SECTOR SOLICITANTE','Sector solicitante','Sector','SECTOR','Área operativa / programática','Area operativa / programatica','Operativa','Programática','Programatica','CUADRILLA']) || 'Sin sector';
  out.__expediente=getField(row,['Nº de expediente','N° de expediente','Nº DE EXPEDIENTE','N° DE EXPEDIENTE','Expediente','EXPEDIENTE','Generó expediente (Sí / No)','Genero expediente (Si / No)']) || '';
  out.__monto=parseMoney(getField(row,['Monto Contrato','Pres. Oficial','Pres. Actual','Costo Directo + IVA','A. Financiero','TOTAL','Monto','Importe']));
  out.__texto=Object.values(row).filter(v=>!Array.isArray(v)).join(' ').toLowerCase();
  return out;
}

function getCell(row,index){ return Array.isArray(row.__cells) ? (row.__cells[index]??'') : ''; }
function getField(row,names){
  const keys=Object.keys(row).filter(k=>k!=='__cells');
  for(const name of names){
    const n=normText(name);
    const found=keys.find(k=>normText(k)===n);
    if(found!==undefined) return row[found];
  }
  return '';
}
function normText(v){return String(v||'').trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').toUpperCase();}
function parseDateFlex(v){
  if(!v) return null;
  const s=String(v).trim(); if(!s) return null;
  if(!isNaN(+s) && +s>20000 && +s<70000) return new Date(Date.UTC(1899,11,30)+(+s)*86400000);
  const m1=s.split(' ')[0].match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m1){ let y=+m1[3]; if(y<100)y+=2000; return new Date(y,+m1[2]-1,+m1[1]); }
  const d=new Date(s.split(' ')[0]); return isNaN(d)?null:d;
}
function parseMoney(v){
  const s=String(v||'').replace(/\$/g,'').replace(/\s/g,'').replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,'');
  const n=Number(s); return isNaN(n)?0:n;
}

function getBaseRows(tab){
  const con=S.raw.consolidado||[];
  const meta=TAB_META[tab]||TAB_META.general;
  if(!meta.filter) return con;
  const allowed=meta.filter.map(normText);
  return con.filter(r=>allowed.includes(normText(r.__derivarRaw)));
}

function getFilteredRows(){
  const rows=getBaseRows(S.activeTab);
  const from=document.getElementById('g-from')?.value;
  const to=document.getElementById('g-to')?.value;
  const estado=document.getElementById('g-estado')?.value;
  const rubro=document.getElementById('g-rubro')?.value;
  const search=String(document.getElementById('g-search')?.value||'').toLowerCase().trim();
  const fromD=from?new Date(from+'T00:00:00'):null;
  const toD=to?new Date(to+'T23:59:59'):null;
  return rows.filter(r=>{
    if(fromD && r.__fecha && r.__fecha<fromD) return false;
    if(toD && r.__fecha && r.__fecha>toD) return false;
    if(estado && r.__estado!==estado) return false;
    if(rubro && r.__rubro!==rubro) return false;
    if(search && !r.__texto.includes(search)) return false;
    return true;
  });
}

function populateFilters(){
  const rows=getBaseRows(S.activeTab);
  const estados=[...new Set(rows.map(r=>r.__estado).filter(v=>v&&v!=='Sin estado'))].sort();
  const rubros=[...new Set(rows.map(r=>r.__rubro).filter(v=>v&&v!=='Sin rubro'))].sort();
  fillSel('g-estado',estados); fillSel('g-rubro',rubros);
}
function fillSel(id,vals){
  const el=document.getElementById(id); if(!el) return;
  const cur=el.value;
  el.innerHTML='<option value="">Todos</option>'+vals.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
  if(vals.includes(cur)) el.value=cur;
}
function applyFilters(){renderModule();}
function clearFilters(){
  ['g-from','g-to','g-estado','g-rubro','g-search'].forEach(id=>{const el=document.getElementById(id); if(el) el.value='';});
  renderModule();
}

function calcMetrics(rows,tab){
  const total=rows.length;
  const estados=countBy(rows,'__estado'), rubros=countBy(rows,'__rubro'), derivs=countBy(rows,'__derivar'), sectores=countBy(rows,'__sector'), efectores=countBy(rows,'__efector');
  const finalizados=rows.filter(r=>isFin(r.__estado)).length;
  const noValidos=rows.filter(r=>isNoValido(r.__estado)).length;
  const pendientes=rows.filter(r=>isPend(r.__estado)).length;
  const criticos=rows.filter(r=>isCrit(r)).length;
  const conFecha=rows.filter(r=>r.__fecha).length;
  const conExp=rows.filter(r=>String(r.__expediente||'').trim()).length;
  const montoT=rows.reduce((s,r)=>s+(r.__monto||0),0);
  return {
    tab,total,estados,rubros,derivs,sectores,efectores,finalizados,noValidos,pendientes,criticos,conFecha,sinFecha:total-conFecha,conExp,montoT,
    topEst:topEntry(estados),topRub:topEntry(rubros),topSec:topEntry(sectores),topEf:topEntry(efectores),
    compRate:pct(finalizados,total),pendRate:pct(pendientes,total),critRate:pct(criticos,total),expRate:pct(conExp,total),dateRate:pct(conFecha,total)
  };
}
function isFin(e){const s=normText(e);return ['FINALIZADO','FINALIZADA','CERRADO','CERRADA','RESUELTO','RESUELTA','COMPLETADO','COMPLETADA','TERMINADO','TERMINADA'].some(x=>s.includes(x));}
function isNoValido(e){const s=normText(e);return ['NO CALIFICA','ANULADO','ANULADA','CANCELADO','CANCELADA','MAL CARGADO','MAL CARGADA'].some(x=>s.includes(x));}
function isPend(e){return !isFin(e)&&!isNoValido(e);}
function isCrit(r){const s=normText(r.__estado+' '+r.__rubro+' '+r.__sector);return s.includes('URGENTE')||s.includes('CRITICO')||s.includes('CRITICA')||s.includes('DEMOR')||s.includes('VENC')||s.includes('EMERGENCIA');}
function countBy(rows,k){const o={};rows.forEach(r=>{const v=String(r[k]||'Sin dato');o[v]=(o[v]||0)+1;});return o;}
function topEntry(obj){return Object.entries(obj||{}).sort((a,b)=>b[1]-a[1])[0]||['Sin dato',0];}
function pct(a,b){return b?Math.round(a/b*1000)/10:0;}
function topObj(obj,n=10){return Object.fromEntries(Object.entries(obj||{}).sort((a,b)=>b[1]-a[1]).slice(0,n));}

function renderModule(){
  showLoading(true);
  const rows=getFilteredRows();
  const m=calcMetrics(rows,S.activeTab);
  renderSummary(m);
  renderKPIs(m);
  renderCharts(rows,m);
  renderTable(rows);
  showLoading(false);
  setStatus(`${fmt(rows.length)} registros · Actualizado ${new Date().toLocaleTimeString('es-AR')}`,'green');
}

function renderSummary(m){
  const meta=TAB_META[m.tab]||TAB_META.general;
  document.getElementById('summary-container').innerHTML=`
    <h3>${esc(meta.title)}</h3>
    <p>Este módulo analiza únicamente la pestaña <strong>CONSOLIDADO</strong>${meta.filter?` filtrada por <strong>DERIVAR = ${esc(meta.filter[0])}</strong>`:' como conjunto institucional completo'}.</p>
    <ul>
      <li>Total analizado: <strong>${fmt(m.total)}</strong> registros.</li>
      <li>Estado dominante: <strong>${esc(m.topEst[0])}</strong> con <strong>${fmt(m.topEst[1])}</strong> registros.</li>
      <li>Rubro principal: <strong>${esc(m.topRub[0])}</strong> con <strong>${fmt(m.topRub[1])}</strong> registros.</li>
      <li>Sector más demandante: <strong>${esc(m.topSec[0])}</strong> con <strong>${fmt(m.topSec[1])}</strong> registros.</li>
    </ul>`;
}

const COLOR_MAP={blue:'var(--blue2)',green:'var(--green2)',amber:'var(--amber2)',red:'var(--red2)',purple:'var(--purple2)',teal:'var(--teal2)'};
const KPI_DEFS=m=>[
  {lbl:'Registros analizados',val:fmt(m.total),sub:'Según módulo y filtros',icon:'📊',color:'blue'},
  {lbl:'Finalizados / Cerrados',val:fmt(m.finalizados),sub:`${m.compRate}% de resolución`,icon:'✅',color:'green',delta:m.compRate>=70?'up':m.compRate>=40?'neu':'dn'},
  {lbl:'Pendientes activos',val:fmt(m.pendientes),sub:`${m.pendRate}% del total`,icon:'⏳',color:'amber',delta:m.pendRate<=30?'up':m.pendRate<=55?'neu':'dn'},
  {lbl:'Registros no válidos',val:fmt(m.noValidos),sub:'No califica / anulado / mal cargado',icon:'🚫',color:'red'},
  {lbl:'Señales de criticidad',val:fmt(m.criticos),sub:`${m.critRate}% con señales`,icon:'🚨',color:'red',delta:m.critRate===0?'up':m.critRate<10?'neu':'dn'},
  {lbl:'Calidad de fechas',val:`${m.dateRate}%`,sub:`${fmt(m.sinFecha)} sin fecha`,icon:'📅',color:'purple',delta:m.dateRate>=80?'up':m.dateRate>=50?'neu':'dn'},
  {lbl:'Con expediente / referencia',val:`${m.expRate}%`,sub:`${fmt(m.conExp)} registros con dato`,icon:'📄',color:'teal',delta:m.expRate>=60?'up':m.expRate>=30?'neu':'dn'},
  {lbl:'Estado dominante',val:truncStr(m.topEst[0],18),sub:`${fmt(m.topEst[1])} registros`,icon:'🎯',color:'blue'},
  {lbl:'Rubro principal',val:truncStr(m.topRub[0],18),sub:`${fmt(m.topRub[1])} registros`,icon:'🔧',color:'amber'},
  {lbl:'Sector más demandante',val:truncStr(m.topSec[0],18),sub:`${fmt(m.topSec[1])} registros`,icon:'🏥',color:'teal'},
  {lbl:'Efector principal',val:truncStr(m.topEf[0],18),sub:`${fmt(m.topEf[1])} registros`,icon:'📍',color:'purple'},
  {lbl:'Monto relevado',val:fmtM(m.montoT),sub:'Según campos monetarios detectados',icon:'💰',color:'green'}
];
function renderKPIs(m){
  document.getElementById('kpi-container').innerHTML=KPI_DEFS(m).map(k=>{
    const accent=COLOR_MAP[k.color]||'var(--blue2)';
    const deltaHtml=k.delta?`<span class="kpi-delta delta-${k.delta}">${k.delta==='up'?'↑ Bueno':k.delta==='dn'?'↓ Atención':'→ Normal'}</span>`:'';
    return `<div class="kpi-card"><div class="kpi-accent" style="background:${accent}"></div><div class="kpi-icon-wrap" style="background:${accent}22">${k.icon}</div><div class="kpi-label">${esc(k.lbl)}</div><div class="kpi-value">${k.val}</div><div class="kpi-sub">${k.sub}</div>${deltaHtml}</div>`;
  }).join('');
}

function destroyCharts(){Object.values(S.charts).forEach(c=>{try{c.destroy()}catch(e){}});S.charts={};}
function renderCharts(rows,m){
  destroyCharts();
  const specs=buildChartSpecs(rows,m);
  document.getElementById('chart-count').textContent=`${specs.length} gráficos`;
  const container=document.getElementById('charts-container');
  container.innerHTML=specs.map((sp,i)=>`<div class="chart-card${sp.wide?' wide':''}"><div class="chart-title">${esc(sp.title)}</div><div class="chart-subtitle">${esc(sp.subtitle)}</div><div class="chart-box${sp.large?' chart-box-lg':''}"><canvas id="chart-${i}"></canvas></div></div>`).join('');
  specs.forEach((sp,i)=>{
    const ctx=document.getElementById(`chart-${i}`); if(!ctx) return;
    const colors=sp.labels.map((_,j)=>PALETTE[j%PALETTE.length]);
    const isPie=sp.type==='pie'||sp.type==='doughnut';
    S.charts[`chart-${i}`]=new Chart(ctx,{type:sp.type,data:{labels:sp.labels,datasets:[{label:sp.title,data:sp.values,backgroundColor:isPie?colors:colors.map(c=>c+'CC'),borderColor:isPie?colors:colors,borderWidth:isPie?1:0,borderRadius:isPie?0:6,tension:.35,fill:sp.type==='line'?'origin':false}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:sp.horizontal?'y':'x',plugins:{legend:{display:isPie,position:'bottom',labels:{font:{size:10},boxWidth:10,padding:8}},tooltip:{callbacks:{label:ctx=>{const v=Number(ctx.raw||0);const tot=sp.values.reduce((a,b)=>a+b,0);return ` ${fmt(v)} (${tot?(v/tot*100).toFixed(1):0}%)`;}}}},scales:isPie?{}:{x:{grid:{color:'#F1F5F9'},ticks:{color:'#64748B',font:{size:10},maxRotation:sp.horizontal?0:35}},y:{beginAtZero:true,grid:{color:'#F1F5F9'},ticks:{color:'#64748B',font:{size:10}}}}}});
  });
}
function buildChartSpecs(rows,m){
  const base=[
    mkChart('Distribución por estado','Composición de registros según estado declarado.','doughnut',topObj(m.estados,8)),
    mkChart('Distribución por rubro','Peso relativo de categorías/rubros.','pie',topObj(m.rubros,8)),
    mkChart('Top sectores solicitantes','Áreas con mayor volumen de registros.','bar',topObj(m.sectores,10),true),
    mkChart('Top efectores / establecimientos','Puntos con mayor demanda registrada.','bar',topObj(m.efectores,10),true),
    mkMonthly(rows,'Evolución mensual','Tendencia temporal de registros según fecha detectada.'),
    mkChart('Resolución vs pendientes','Comparativo ejecutivo del estado de gestión.','bar',{'Finalizados':m.finalizados,'Pendientes':m.pendientes,'No válidos':m.noValidos,'Con señales críticas':m.criticos}),
  ];
  if(m.tab==='general') base.push(mkChart('Derivación por área','Distribución según columna DERIVAR del CONSOLIDADO.','doughnut',topObj(m.derivs,8)));
  base.push(mkChart('Calidad de datos','Completitud mínima para lectura ejecutiva.','bar',{'Con fecha':m.conFecha,'Sin fecha':m.sinFecha,'Con expediente/referencia':m.conExp}));
  return base.filter(Boolean).slice(0,10);
}
function mkChart(title,subtitle,type,obj,horizontal=false,opts={}){
  const entries=Object.entries(obj||{}).filter(([,v])=>Number(v)>0).sort((a,b)=>b[1]-a[1]).slice(0,12);
  if(!entries.length) return null;
  return {title,subtitle,type,horizontal,labels:entries.map(e=>e[0]),values:entries.map(e=>e[1]),...opts};
}
function mkMonthly(rows,title,subtitle){
  const obj={};
  rows.forEach(r=>{if(!r.__fecha)return;const k=`${r.__fecha.getFullYear()}-${String(r.__fecha.getMonth()+1).padStart(2,'0')}`;obj[k]=(obj[k]||0)+1;});
  const sorted=Object.entries(obj).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!sorted.length) return null;
  return {title,subtitle,type:'line',horizontal:false,wide:true,labels:sorted.map(e=>e[0]),values:sorted.map(e=>e[1])};
}

function renderTable(rows){
  const sample=rows.slice(0,40);
  const cont=document.getElementById('table-container');
  if(!sample.length){cont.innerHTML='<div class="empty-state"><div class="es-icon">🔍</div><h3>Sin resultados</h3><p>No hay registros con los filtros actuales. Ajustá el período o eliminá los filtros.</p></div>';return;}
  cont.innerHTML=`<div class="table-header"><h3>Muestra de registros (${sample.length} de ${fmt(rows.length)})</h3><span style="font-size:11px;color:var(--muted)">Datos desde CONSOLIDADO</span></div><div class="table-wrap"><table class="dt"><thead><tr><th>Fecha</th><th>Derivar</th><th>Estado</th><th>Rubro / Tipo</th><th>Sector / Área</th><th>Efector</th><th>Expediente / Ref.</th><th>Monto</th></tr></thead><tbody>${sample.map(r=>{
    const badgeCls=badgeForEstado(r.__estado);
    return `<tr><td style="white-space:nowrap">${r.__fecha?r.__fecha.toLocaleDateString('es-AR'):'—'}</td><td><span class="badge badge-blue">${esc(r.__derivarRaw||r.__derivar)}</span></td><td><span class="badge ${badgeCls}">${esc(r.__estado)}</span></td><td>${esc(truncStr(r.__rubro,32))}</td><td>${esc(truncStr(r.__sector,28))}</td><td>${esc(truncStr(r.__efector,30))}</td><td>${r.__expediente?`<span class="badge badge-purple">${esc(truncStr(r.__expediente,24))}</span>`:'—'}</td><td style="white-space:nowrap">${r.__monto?fmtM(r.__monto):'—'}</td></tr>`;
  }).join('')}</tbody></table></div>`;
}
function badgeForEstado(e){const s=normText(e);if(isFin(s))return 'badge-green';if(isNoValido(s))return 'badge-gray';if(s.includes('URGENTE')||s.includes('CRIT')||s.includes('VENC')||s.includes('DEMOR'))return 'badge-red';if(s.includes('PROCESO')||s.includes('EJEC')||s.includes('PROGRAM'))return 'badge-blue';return 'badge-amber';}

function exportPDF(){
  toast('⏳ Generando PDF...');
  const el=document.getElementById('export-area');
  const tab=TAB_META[S.activeTab]?.title||S.activeTab;
  html2pdf().set({margin:[8,8,8,8],filename:`DGIME_${tab.replace(/\s+/g,'_')}.pdf`,image:{type:'jpeg',quality:.97},html2canvas:{scale:2,useCORS:true,logging:false},jsPDF:{unit:'mm',format:'a4',orientation:'landscape'},pagebreak:{mode:['avoid-all','css','legacy']}}).from(el).save().then(()=>toast('✓ PDF exportado correctamente'));
}
function updateBadges(){['general','obras','produccion','rf'].forEach(t=>{const el=document.getElementById(`badge-${t}`);if(el)el.textContent=fmt(getBaseRows(t).length);});}
function showSourceStatus(){const ts=S.lastRefresh?S.lastRefresh.toLocaleTimeString('es-AR'):'no cargado';toast(`📊 CONSOLIDADO: ${fmt(S.raw.consolidado.length)} registros · ${ts}`,4000);}
function showLoading(show){document.getElementById('loading-bar').style.display=show?'block':'none';}
function setStatus(msg,type='green'){const dot=document.querySelector('#status-pill .status-dot');const txt=document.getElementById('status-text');if(dot)dot.style.background=type==='green'?'var(--green2)':type==='amber'?'var(--amber2)':'var(--red2)';if(txt)txt.textContent=msg;}
let toastTimer;function toast(msg,duration=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),duration);}
function fmt(n){return new Intl.NumberFormat('es-AR').format(Number(n||0));}
function fmtM(n){const v=Number(n||0);if(v===0)return '—';if(v>=1e6)return `$${(v/1e6).toFixed(1)}M`;if(v>=1e3)return `$${(v/1e3).toFixed(0)}K`;return `$${fmt(v)}`;}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');}
function truncStr(s,n){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s;}
</script>
